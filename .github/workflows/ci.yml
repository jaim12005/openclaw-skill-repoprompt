name: ci

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate shell syntax
        run: for f in scripts/*.sh; do bash -n "$f"; done

      - name: Run offline smoke test
        run: bash scripts/smoke.sh --offline
